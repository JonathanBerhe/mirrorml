# Copy this to .github/workflows/mirrorml.yml in YOUR repository.
#
# It runs the MirrorML skew check on every pull request that touches feature
# code, and fails the build if the offline and online pipelines diverge.
name: MirrorML

on:
  pull_request:
    paths:
      - "**/*.py"
      - "**/*.sql"
      - "mirrorml_check.py"

jobs:
  skew:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pinned to a released tag for reproducible CI; @main tracks the latest.
      - uses: JonathanBerhe/mirrorml@v0.1.1
        with:
          extras: "pandas,polars"
          version: "0.1.1"   # pin the installed mirrorml package
