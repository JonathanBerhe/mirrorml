name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on new pushes to the same branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dev + all extras
        run: uv sync --dev --all-extras
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  typecheck:
    name: Typecheck (mypy --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dev + all extras
        run: uv sync --dev --all-extras
      - run: uv run mypy

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dev + all extras
        run: uv sync --dev --all-extras --python ${{ matrix.python-version }}
      - name: Run tests
        run: uv run --python ${{ matrix.python-version }} pytest -q

  bench:
    name: MirrorBench (synthetic, gated)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dev deps
        run: uv sync --dev
      - name: Run evaluator with regression gates
        env:
          # CLAUDE.md targets. Failing CI on a drop below either means
          # the change either regressed the diff classifier or made the
          # synthetic corpus harder without updating expectations.
          PRECISION_GATE: "0.95"
          RECALL_GATE: "0.80"
        run: |
          uv run python -m bench.scripts.run_eval \
            --quick \
            --fail-under-precision "$PRECISION_GATE" \
            --fail-under-recall "$RECALL_GATE" \
            --github-step-summary "$GITHUB_STEP_SUMMARY"
      - name: Upload bench results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-results
          path: bench/results/
          if-no-files-found: ignore
          retention-days: 30
