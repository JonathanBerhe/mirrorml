name: Release

# release-please owns versioning end to end. It watches Conventional
# Commits on ``main`` and keeps a single open "release PR" that bumps the
# version (in pyproject.toml, via the ``x-release-please-version`` marker)
# and regenerates CHANGELOG.md. Merging that PR makes release-please cut
# the GitHub release and the ``vX.Y.Z`` tag, and flips
# ``release_created=true``.
#
# Publishing lives in this same workflow, gated on that output. That is
# deliberate: a tag pushed by the default GITHUB_TOKEN does not trigger a
# separate ``on: push: tags`` workflow, so consolidating here avoids
# needing a PAT to bridge the tag event while keeping PyPI trusted
# publishing (OIDC, no API token in CI secrets).
#
# On a normal push to main only the lightweight ``release-please`` job
# runs (it just maintains the PR). The verify / build / publish jobs run
# only when a release PR merge produces a release.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-please:
    name: Release PR / tag
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release + tag
      pull-requests: write # open and maintain the release PR
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  verify:
    name: Verify (lint / typecheck / test / bench)
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dev + all extras
        run: uv sync --dev --all-extras
      - name: Ruff lint + format
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Mypy strict
        run: uv run mypy
      - name: Pytest
        run: uv run pytest -q
      - name: Bench (synthetic, with all gates)
        run: |
          uv run python -m bench.scripts.run_eval --quick \
            --fail-under-precision 0.95 \
            --fail-under-recall 0.80 \
            --fail-under-localization-top1 0.75

  build:
    name: Build sdist + wheel
    needs: [release-please, verify]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install 3.12
      - name: Build
        run: uv build
      - name: Inspect artifacts
        run: |
          ls -lh dist/
          uv run python -c "import pathlib
          for p in sorted(pathlib.Path('dist').iterdir()):
              print(p.name, p.stat().st_size, 'bytes')"
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: [release-please, build]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    # Trusted publishing requires this workflow to declare ``id-token: write``
    # AND the PyPI project to be configured to trust this exact workflow
    # (filename ``release.yml``). Configure once at
    # https://pypi.org/manage/account/publishing/ and subsequent releases
    # publish automatically.
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/mirrorml/
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI (OIDC trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # No password: trusted publishing uses OIDC.
